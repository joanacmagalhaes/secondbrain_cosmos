<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #f0f0f0;
    }

    .logo {
      font-weight: 600;
      font-size: 14px;
      color: #7c3aed;
      letter-spacing: -0.3px;
    }

    .page-info {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
    }

    .page-title {
      font-weight: 500;
      color: #111;
      line-height: 1.4;
      margin-bottom: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .page-url {
      font-size: 11px;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .notes-area {
      padding: 10px 16px;
      border-bottom: 1px solid #f0f0f0;
    }

    textarea {
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-size: 12px;
      color: #555;
      font-family: inherit;
      line-height: 1.5;
      background: transparent;
    }

    textarea::placeholder { color: #ccc; }

    .footer {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status {
      font-size: 12px;
      color: #aaa;
    }

    .status.success { color: #16a34a; font-weight: 500; }
    .status.error   { color: #dc2626; }

    .save-btn {
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 20px;
      padding: 7px 18px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }

    .save-btn:hover   { background: #6d28d9; }
    .save-btn:disabled { background: #c4b5fd; cursor: default; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">secondmind</span>
  </div>

  <div class="page-info">
    <div class="page-title" id="page-title">Loading…</div>
    <div class="page-url"  id="page-url"></div>
  </div>

  <div class="notes-area">
    <textarea id="notes" rows="2" placeholder="Add a note… (optional)"></textarea>
  </div>

  <div class="footer">
    <span class="status" id="status"></span>
    <button class="save-btn" id="save-btn">Save</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
